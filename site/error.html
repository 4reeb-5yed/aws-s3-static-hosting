<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .card {
    max-width: 480px;
    width: 100%;
    text-align: center;
    background: #1e293b;
    border-radius: 12px;
    padding: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 48px;
    color: #f87171;
    margin-bottom: 10px;
  }
  p {
    color: #94a3b8;
    margin-bottom: 20px;
    line-height: 1.6;
  }
  a {
    color: #38bdf8;
    text-decoration: none;
    font-size: 14px;
  }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="card">
    <h1>404</h1>
    <p>This page doesn't exist. It's being served as a static error document directly from the S3 bucket.</p>
    <a href="index.html">← Back to home</a>
  </div>
</body>
</html>
